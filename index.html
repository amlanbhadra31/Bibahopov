<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Amlan & Sambita — Wedding Memory Booth</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Shrikhand&display=swap" rel="stylesheet" />
<style>
  :root{
    --coral:#E76F5E;
    --coral-soft:#F79A76;
    --peach:#F6B39D;
    --cream:#FFF4DF;
    --cream-deep:#F4E1BC;
    --yellow:#F3B600;
    --teal:#079B78;
    --teal-dark:#006B55;
    --brown:#3B1A0A;
    --olive:#596241;
    --paper:#FFF8EA;
    --shadow:rgba(59,26,10,.28);
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; min-height:100%; }

  body{
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px 12px;
    font-family:'Baloo 2', system-ui, sans-serif;
    color:var(--brown);
    background:#f7f3ea;
  }

  .app-shell{
    width:min(100%, 430px);
    min-height:720px;
    position:relative;
    overflow:hidden;
    border-radius:18px;
    background:
      linear-gradient(rgba(255,244,223,.22), rgba(255,244,223,.22)),
      conic-gradient(from -8deg at 50% 42%,
        var(--yellow) 0deg 18deg,
        #fff0bd 18deg 36deg,
        var(--coral-soft) 36deg 54deg,
        var(--peach) 54deg 72deg,
        var(--yellow) 72deg 90deg,
        #fff0bd 90deg 108deg,
        var(--coral-soft) 108deg 126deg,
        var(--peach) 126deg 144deg,
        var(--yellow) 144deg 162deg,
        #fff0bd 162deg 180deg,
        var(--coral-soft) 180deg 198deg,
        var(--peach) 198deg 216deg,
        var(--yellow) 216deg 234deg,
        #fff0bd 234deg 252deg,
        var(--coral-soft) 252deg 270deg,
        var(--peach) 270deg 288deg,
        var(--yellow) 288deg 306deg,
        #fff0bd 306deg 324deg,
        var(--coral-soft) 324deg 342deg,
        var(--peach) 342deg 360deg
      );
    box-shadow:0 24px 70px -28px var(--shadow);
    isolation:isolate;
  }

  .app-shell::before{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    background:
      linear-gradient(180deg, rgba(255,244,223,.22), rgba(255,244,223,.06)),
      radial-gradient(rgba(59,26,10,.13) .8px, transparent .8px);
    background-size:auto, 4px 4px;
    opacity:.18;
    z-index:0;
  }

  .content{
    position:relative;
    z-index:2;
    min-height:720px;
    padding:26px 22px 24px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .top-badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:205px;
    padding:8px 18px 9px;
    background:var(--teal);
    color:var(--cream);
    border:3px solid var(--brown);
    border-radius:999px;
    box-shadow:4px 5px 0 var(--brown);
    font-size:13px;
    font-weight:800;
    letter-spacing:.14em;
    text-transform:uppercase;
    line-height:1;
    margin:0 auto 20px;
    position:relative;
  }

  .top-badge::before,
  .top-badge::after{
    content:"✦";
    position:absolute;
    color:var(--paper);
    text-shadow:2px 2px 0 var(--brown);
    font-size:16px;
    line-height:1;
  }

  .top-badge::before{ left:12px; top:-10px; }
  .top-badge::after{ right:12px; bottom:-10px; }

  .title-card{
    width:100%;
    max-width:330px;
    margin:0 auto 22px;
    padding:16px 18px 18px;
    background:var(--paper);
    border:3px solid var(--brown);
    border-radius:32px;
    box-shadow:6px 7px 0 var(--brown);
    text-align:center;
    position:relative;
  }



  .title-card::before{ left:17px; transform:rotate(-12deg); }
  .title-card::after{ right:17px; transform:rotate(12deg); }

  .couple-name{
    margin:0;
    font-family:'Shrikhand','Cooper Black','Baloo 2',cursive;
    font-size:40px;
    line-height:.98;
    letter-spacing:.01em;
    color:var(--brown);
    text-shadow:2px 2px 0 rgba(255,244,223,.9);
  }

  .app-subtitle{
    margin:8px 0 0;
    font-size:13px;
    line-height:1;
    letter-spacing:.17em;
    text-transform:uppercase;
    color:var(--teal-dark);
    font-weight:800;
  }

  .star{
    position:absolute;
    width:52px;
    height:52px;
    z-index:1;
    filter:drop-shadow(2px 3px 0 rgba(59,26,10,.18));
  }

  .star svg{ width:100%; height:100%; display:block; }
  .star path{ fill:var(--paper); stroke:var(--brown); stroke-width:4; stroke-linejoin:round; }

  .star.s1{ top:86px; left:6px; }
  .star.s2{ top:86px; right:6px; }
  .star.s3{ bottom:106px; left:10px; }
  .star.s4{ bottom:106px; right:10px; }

  .tv-wrap{
    width:100%;
    max-width:360px;
    margin:0 auto;
    position:relative;
  }

  .retro-tv{
    position:relative;
    width:100%;
    border:7px solid var(--brown);
    border-radius:34px;
    background:var(--teal);
    padding:13px 13px 56px;
    box-shadow:8px 10px 0 var(--brown), 0 18px 45px -28px var(--shadow);
  }

  .retro-tv::before{
    content:"";
    position:absolute;
    inset:5px;
    border:3px solid var(--teal-dark);
    border-radius:27px;
    pointer-events:none;
  }

  .screen{
    position:relative;
    width:100%;
    aspect-ratio:1.38/1;
    border-radius:27px;
    background:var(--paper);
    border:5px solid var(--brown);
    padding:12px;
    overflow:hidden;
  }

  .screen::before{
    content:"";
    position:absolute;
    inset:9px;
    border:2px solid var(--brown);
    border-radius:22px;
    opacity:.65;
    pointer-events:none;
  }

  .screen::after{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    background:radial-gradient(rgba(59,26,10,.16) .85px, transparent .85px);
    background-size:5px 5px;
    opacity:.16;
  }

  #frameSlot,
  .photo-placeholder,
  .photo-frame{
    width:100%;
    height:100%;
  }

  .photo-placeholder{
    position:relative;
    z-index:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:12px;
    text-align:center;
    padding:24px;
    color:var(--olive);
  }

  .placeholder-ring{
    width:72px;
    height:72px;
    border-radius:50%;
    background:var(--teal);
    color:var(--cream);
    display:grid;
    place-items:center;
    border:4px solid var(--brown);
    box-shadow:4px 5px 0 var(--brown);
  }

  .placeholder-ring svg{
    width:34px;
    height:34px;
  }

  .photo-placeholder p{
    margin:0;
    max-width:270px;
    font-size:21px;
    line-height:1.12;
    color:var(--olive);
    font-weight:700;
    text-transform:lowercase;
  }

  .photo-frame{
    position:relative;
    z-index:1;
    border-radius:18px;
    overflow:hidden;
    background:var(--paper);
  }

  .photo-frame img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    border-radius:16px;
  }

  .tv-controls{
    position:absolute;
    left:16px;
    right:16px;
    bottom:12px;
    height:34px;
    background:var(--cream);
    border:4px solid var(--brown);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    border-radius:8px;
    overflow:hidden;
  }

  .speaker-grid{
    width:145px;
    height:20px;
    background:
      linear-gradient(90deg, var(--brown) 2px, transparent 2px),
      linear-gradient(var(--brown) 2px, transparent 2px);
    background-size:9px 6px;
    opacity:.86;
  }

  .knob{
    width:32px;
    height:32px;
    flex:0 0 auto;
    border:4px solid var(--brown);
    background:var(--cream);
    border-radius:50%;
    position:relative;
  }

  .knob::after{
    content:"";
    position:absolute;
    inset:7px;
    border-radius:50%;
    background:var(--teal);
    border:3px solid var(--brown);
  }

  .capture-area{
    width:100%;
    margin-top:24px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
  }

  .capture-btn{
    display:inline-flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    align-self:center;
  }

  .capture-btn input{ display:none; }

  .capture-btn-inner,
  .save-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    border-radius:999px;
    background:var(--teal);
    color:var(--cream);
    border:3px solid var(--brown);
    box-shadow:4px 5px 0 var(--brown);
    font-family:'Baloo 2', system-ui, sans-serif;
    font-weight:800;
    line-height:1;
    cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease;
  }

  .capture-btn-inner{
    min-width:205px;
    padding:11px 24px 12px;
    font-size:17px;
  }

  .capture-btn-inner svg{
    width:18px;
    height:18px;
    margin-right:8px;
  }

  .save-btn{
    display:none;
    min-width:176px;
    padding:9px 18px 10px;
    font-size:13px;
    background:var(--cream);
    color:var(--brown);
  }

  .capture-btn:active .capture-btn-inner,
  .save-btn:active{
    transform:translate(3px, 3px);
    box-shadow:1px 2px 0 var(--brown);
  }

  .status-footer{
    width:100%;
    margin-top:auto;
    padding-top:18px;
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
  }

  .status{
    min-height:20px;
    margin:0;
    font-size:14px;
    line-height:1.2;
    font-weight:700;
    color:var(--brown);
    max-width:330px;
  }

  .status.loading{ color:var(--teal-dark); }
  .status.success{ color:var(--teal-dark); }
  .status.error{ color:#A32622; }

  .signature{
    margin:0;
    font-family:'Baloo 2', system-ui, sans-serif;
    font-size:14px;
    line-height:1.08;
    font-weight:800;
    color:var(--cream);
    background:var(--teal);
    padding:8px 22px 9px;
    border-radius:18px;
    border:3px solid var(--brown);
    box-shadow:4px 5px 0 var(--brown);
    min-width:205px;
    position:relative;
  }

  .signature::before,
  .signature::after{
    content:"✦";
    position:absolute;
    color:var(--paper);
    text-shadow:2px 2px 0 var(--brown);
    font-size:12px;
  }

  .signature::before{ left:10px; top:-7px; }
  .signature::after{ right:10px; bottom:-7px; }

  @media (max-width:420px){
    body{ padding:0; background:#f7f3ea; }
    .app-shell{ width:100%; min-height:100dvh; border-radius:0; }
    .content{ min-height:100dvh; padding:24px 18px 20px; }
    .top-badge{ margin-bottom:17px; transform:scale(.94); }
    .title-card{ max-width:310px; padding:14px 16px 16px; margin-bottom:20px; }
    .couple-name{ font-size:35px; }
    .app-subtitle{ font-size:12px; }
    .tv-wrap{ max-width:340px; }
    .retro-tv{ padding:12px 12px 52px; border-width:6px; }
    .screen{ border-width:4px; }
    .photo-placeholder p{ font-size:19px; }
    .placeholder-ring{ width:66px; height:66px; }
    .star{ width:42px; height:42px; }
    .star.s1{ top:92px; left:6px; }
    .star.s2{ top:92px; right:6px; }
    .star.s3{ bottom:108px; left:8px; }
    .star.s4{ bottom:108px; right:8px; }
    .capture-area{ margin-top:22px; }
    .signature{ font-size:13px; min-width:190px; }
  }

  @media (max-height:720px){
    .app-shell{ min-height:680px; }
    .content{ min-height:680px; padding-top:18px; }
    .top-badge{ margin-bottom:14px; }
    .title-card{ margin-bottom:16px; }
    .couple-name{ font-size:33px; }
    .tv-wrap{ max-width:330px; }
    .capture-area{ margin-top:18px; }
    .status-footer{ padding-top:12px; }
  }

  /* Alignment polish */
  .content{
    justify-content:flex-start;
    gap:0;
    padding:24px 22px 22px;
  }

  .top-badge{
    margin:0 auto 18px;
    text-align:center;
  }

  .title-card{
    margin:0 auto 22px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }

  .couple-name{
    text-align:center;
  }

  .app-subtitle{
    text-align:center;
    max-width:100%;
  }

  .tv-wrap{
    display:flex;
    justify-content:center;
    align-items:center;
  }

  .screen{
    display:flex;
    align-items:center;
    justify-content:center;
  }

  #frameSlot{
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .photo-placeholder{
    margin:0 auto;
  }

  .photo-placeholder p{
    text-align:center;
  }

  .capture-area{
    margin-top:22px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:12px;
  }

  .capture-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    width:100%;
    margin:0 auto;
  }

  .capture-btn-inner{
    min-width:205px;
    max-width:230px;
    min-height:46px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    text-align:center;
    white-space:nowrap;
  }

  .capture-btn-inner .label-text{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    line-height:1;
    text-align:center;
  }

  .save-btn{
    margin:0 auto;
    align-items:center;
    justify-content:center;
    text-align:center;
  }

  .status-footer{
    margin-top:auto;
    padding-top:18px;
    align-items:center;
    justify-content:flex-end;
  }

  .status{
    text-align:center;
    width:100%;
  }

  .signature{
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    margin:0 auto;
  }

  @media (max-width:420px){
    .content{
      padding:22px 18px 20px;
    }

    .top-badge{
      margin-bottom:16px;
    }

    .title-card{
      margin-bottom:18px;
    }

    .capture-area{
      margin-top:20px;
      gap:10px;
    }

    .capture-btn-inner{
      min-width:198px;
      max-width:220px;
    }

    .status-footer{
      padding-top:14px;
    }
  }


  /* Final typography system */
  .couple-name{
    font-family:'Shrikhand', 'Cooper Black', cursive;
    font-size:40px;
    line-height:.95;
    letter-spacing:.01em;
  }

  .top-badge,
  .app-subtitle,
  .photo-placeholder p,
  .capture-btn-inner,
  .save-btn,
  .status{
    font-family:'Baloo 2', system-ui, sans-serif;
  }

  .app-subtitle{
    font-size:13px;
    font-weight:800;
    letter-spacing:.17em;
    text-transform:uppercase;
  }

  .photo-placeholder p{
    font-size:21px;
    font-weight:700;
    line-height:1.12;
  }

  .capture-btn-inner{
    font-size:17px;
    font-weight:800;
  }

  .save-btn{
    font-weight:800;
  }

  .signature{
    font-family:'Baloo 2', system-ui, sans-serif;
    font-size:14px;
    line-height:1.12;
    font-weight:800;
    letter-spacing:.01em;
  }

  @media (max-width:420px){
    .couple-name{
      font-size:35px;
    }

    .signature{
      font-size:15px;
    }
  }

  @media (max-height:720px){
    .couple-name{
      font-size:33px;
    }

    .signature{
      font-size:14px;
    }
  }


  /* Camera icon + button text alignment fix */
  .capture-btn-inner{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    vertical-align:middle;
  }

  .capture-btn-inner svg{
    flex:0 0 auto;
    width:18px;
    height:18px;
    margin:0;
    display:block;
    transform:translateY(-1px);
  }

  .capture-btn-inner .label-text{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    line-height:1;
    white-space:nowrap;
    transform:translateY(1px);
  }


  /* Upload interaction polish */
  .capture-btn.is-disabled{
    pointer-events:none;
  }

  .capture-btn.is-disabled .capture-btn-inner{
    opacity:.88;
    cursor:not-allowed;
  }

  .capture-btn-inner:active,
  .save-btn:active{
    transform:translate(3px,3px);
    box-shadow:1px 2px 0 var(--brown);
  }

  .privacy-after-upload{
    display:none;
    margin:2px 0 0;
    color:var(--teal-dark);
    font-family:'Baloo 2', system-ui, sans-serif;
    font-size:12px;
    font-weight:700;
    line-height:1.2;
    text-align:center;
  }

  .privacy-after-upload.show{
    display:block;
  }


  /* Prevent download while upload is still in progress */
  .save-btn:disabled{
    opacity:.65;
    cursor:not-allowed;
    pointer-events:none;
  }

  /* Download button appears only after successful upload */
  .save-btn:disabled{
    opacity:.65;
    cursor:not-allowed;
    pointer-events:none;
  }


  /* Lightweight animations */
  .top-badge::before,
  .top-badge::after,
  .signature::before,
  .signature::after{
    animation:twinkle 1.8s ease-in-out infinite;
    transform-origin:center;
  }

  @keyframes twinkle{
    0%,100%{
      opacity:.75;
      transform:scale(1);
    }
    50%{
      opacity:1;
      transform:scale(1.15);
    }
  }

  .capture-btn-inner,
  .save-btn{
    transition:transform .15s ease, box-shadow .15s ease;
  }

  @media (hover:hover){
    .capture-btn-inner:hover,
    .save-btn:hover{
      transform:translateY(-2px);
    }
  }


  /* Mobile preview fit fix */
  .screen{
    aspect-ratio:1.38 / 1;
    min-height:unset;
  }

  #frameSlot{
    width:100%;
    height:100%;
    position:relative;
    z-index:2;
  }

  .photo-frame{
    width:100%;
    height:100%;
    aspect-ratio:auto;
    padding:0;
    border:0;
    box-shadow:none;
    background:transparent;
    border-radius:20px;
    overflow:hidden;
  }

  .photo-frame img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
    border-radius:18px;
    display:block;
  }

  @media (max-width:420px){
    .screen{
      aspect-ratio:1.28 / 1;
      min-height:unset;
      padding:10px;
    }

    .photo-frame{
      border-radius:18px;
    }

    .photo-frame img{
      border-radius:16px;
    }
  }

  @media (max-width:360px){
    .screen{
      aspect-ratio:1.22 / 1;
      padding:9px;
    }
  }


  /* Strong mobile/desktop preview fill fix */
  .screen.preview-active{
    padding:0;
  }

  .screen.preview-active::before{
    display:none;
  }

  .screen.preview-active #frameSlot{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    z-index:2;
  }

  .screen.preview-active .photo-frame{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    aspect-ratio:auto;
    padding:0;
    border:0;
    box-shadow:none;
    background:transparent;
    border-radius:22px;
    overflow:hidden;
  }

  .screen.preview-active .photo-frame img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center center;
    border-radius:20px;
    display:block;
  }

  @media (max-width:420px){
    .screen.preview-active{
      padding:0;
    }

    .screen.preview-active .photo-frame{
      border-radius:20px;
    }

    .screen.preview-active .photo-frame img{
      border-radius:18px;
    }
  }

</style>
</head>
<body>
  <main class="app-shell" role="main">
    <div class="content">
      <div class="top-badge">Wedding Memory Booth</div>

      <section class="title-card" aria-label="Couple name">
        <h1 class="couple-name">Amlan &amp;<br>Sambita</h1>
        <p class="app-subtitle">Moments From Our Forever</p>
      </section>

      <section class="tv-wrap" aria-label="Photo upload area">
        <div class="retro-tv">
          <div class="screen">
            <div id="frameSlot">
              <div class="photo-placeholder" id="placeholder">
                <div class="placeholder-ring" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 8h3l2-2h6l2 2h3a1 1 0 011 1v9a1 1 0 01-1 1H4a1 1 0 01-1-1V9a1 1 0 011-1z" />
                    <circle cx="12" cy="13" r="3.5" />
                  </svg>
                </div>
                <p>Capture a moment<br>we'll treasure forever</p>
              </div>
            </div>
          </div>

          <div class="tv-controls" aria-hidden="true">
            <div class="knob"></div>
            <div class="speaker-grid"></div>
            <div class="knob"></div>
          </div>
        </div>
      </section>

      <section class="capture-area">
        <label class="capture-btn">
          <input type="file" id="cameraInput" accept="image/*" capture="environment" />
          <span class="capture-btn-inner" id="captureLabel">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 8h3l2-2h6l2 2h3a1 1 0 011 1v9a1 1 0 01-1 1H4a1 1 0 01-1-1V9a1 1 0 011-1z" />
              <circle cx="12" cy="13" r="3.5" />
            </svg>
            <span class="label-text">Add to Memories</span>
          </span>
        </label>

        <button class="save-btn" id="savePhoneBtn">Download Photo</button>
      </section>

      <footer class="status-footer">
        <p class="status" id="status">&nbsp;</p>
        <p class="privacy-after-upload" id="privacyNote">Saved privately for Amlan &amp; Sambita.</p>
        <div class="signature">Forever grateful,<br>Amlan &amp; Sambita</div>
      </footer>
    </div>
  </main>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyHe2KsUovNfHoOb0UT5nG9f3DhowNKFHW8FJQbyBr8bualnScJtnNksE3GjDE9m3hQ/exec';

  const cameraInput  = document.getElementById('cameraInput');
  const savePhoneBtn = document.getElementById('savePhoneBtn');
  const statusText   = document.getElementById('status');
  const frameSlot    = document.getElementById('frameSlot');
  const screenBox    = document.querySelector('.screen');
  const captureLabel = document.getElementById('captureLabel');
  const captureButton = document.querySelector('.capture-btn');
  const privacyNote  = document.getElementById('privacyNote');
  const labelText    = captureLabel.querySelector('.label-text');

  let currentBase64Image = "";

  function setStatus(text, tone){
    statusText.textContent = text;
    statusText.className = 'status ' + (tone || '');
  }

  function setUploading(isUploading){
    cameraInput.disabled = isUploading;
    savePhoneBtn.disabled = isUploading;
    captureButton.classList.toggle('is-disabled', isUploading);
    labelText.textContent = isUploading ? 'Uploading...' : 'Retake Memory';
  }

  function showPrivacyNote(){
    privacyNote.classList.add('show');
  }

  function hidePrivacyNote(){
    privacyNote.classList.remove('show');
  }

  function showImage(src){
    screenBox.classList.add('preview-active');
    frameSlot.innerHTML = '<div class="photo-frame"><img id="preview" alt="Your captured moment" /></div>';
    document.getElementById('preview').src = src;
    savePhoneBtn.style.display = 'none';
    savePhoneBtn.disabled = true;
  }

  cameraInput.addEventListener('change', (event) => {
    const file = event.target.files[0];
    if (!file) return;

    showImage(URL.createObjectURL(file));
    hidePrivacyNote();
    setUploading(true);
    setStatus("\u00a0", "loading");

    const reader = new FileReader();
    reader.onload = function(e){
      currentBase64Image = e.target.result;

      fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ image: currentBase64Image }),
        mode: 'no-cors'
      })
      .then(() => {
        setUploading(false);
        savePhoneBtn.style.display = 'inline-flex';
        savePhoneBtn.disabled = false;
        setStatus("\u00a0", "success");
        showPrivacyNote();
        setTimeout(() => hidePrivacyNote(), 2000);
      })
      .catch(() => {
        cameraInput.disabled = false;
        savePhoneBtn.style.display = 'none';
        savePhoneBtn.disabled = true;
        captureButton.classList.remove('is-disabled');
        labelText.textContent = 'Add to Memories';
        hidePrivacyNote();
        setStatus("Upload failed. Please check your internet and try again.", "error");
      });
    };
    reader.readAsDataURL(file);
  });

  savePhoneBtn.addEventListener('click', () => {
    if (savePhoneBtn.disabled || !currentBase64Image) return;
    const a = document.createElement('a');
    a.href = currentBase64Image;
    a.download = `Amlan_Sambita_Wedding_${Date.now()}.jpg`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    const original = savePhoneBtn.textContent;
    savePhoneBtn.textContent = 'Saved ✓';
    setTimeout(() => savePhoneBtn.textContent = original, 2000);
  });
</script>
</body>
</html>
