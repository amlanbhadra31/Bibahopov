<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amlan & Sambita's Wedding Camera</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

  <style>
    body { 
      font-family: 'Lora', serif;
      display: flex; 
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #4a2c1b; 
      background-image: radial-gradient(circle at center, #6d3f25 0%, #301b10 100%);
      color: #333;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px 20px;
      border-radius: 16px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
      text-align: center;
      width: 90%;
      max-width: 400px;
      border: 2px solid #e2b36c; 
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 48px;
      color: #8b0000; 
      margin: 0 0 10px 0;
      font-weight: normal;
    }
    
    p.subtitle {
      font-size: 16px;
      color: #666;
      margin-bottom: 30px;
      font-style: italic;
    }

    .custom-file-upload {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 15px 30px;
      cursor: pointer;
      background: linear-gradient(135deg, #e2b36c 0%, #c48b36 100%); 
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      border-radius: 50px; 
      margin-bottom: 20px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(196, 139, 54, 0.4);
      width: 80%;
      box-sizing: border-box;
    }
    
    .custom-file-upload:active {
      transform: scale(0.96);
    }

    input[type="file"] { 
      display: none; 
    }

    button { 
      padding: 15px 30px; 
      font-size: 18px; 
      font-weight: bold;
      cursor: pointer; 
      background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%); 
      color: white; 
      border: none; 
      border-radius: 50px; 
      width: 80%;
      margin: 0 auto;
      transition: transform 0.2s, opacity 0.2s;
      box-shadow: 0 4px 15px rgba(46, 125, 50, 0.4);
    }

    button:disabled { 
      background: #ccc; 
      box-shadow: none;
      cursor: not-allowed; 
    }

    #preview-container {
      position: relative;
      margin-bottom: 20px;
    }

    #preview { 
      max-width: 100%; 
      height: auto;
      border-radius: 12px; 
      display: none; 
      border: 3px solid #e2b36c;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    #status { 
      margin-top: 20px; 
      font-weight: 600; 
      font-size: 15px;
      color: #555;
      min-height: 24px;
    }

    .icon {
      font-size: 22px;
      margin-right: 8px;
    }
  </style>
</head>
<body>

  <div class="glass-card">
    <h1>Amlan & Sambita</h1>
    <p class="subtitle">Help us capture the magic of today!</p>
    
    <label class="custom-file-upload">
      <input type="file" id="cameraInput" accept="image/*" capture="environment">
      <span class="icon">📸</span> Open Camera
    </label>
    
    <div id="preview-container">
      <img id="preview" alt="Your beautiful photo">
    </div>
    
    <button id="uploadBtn" style="display:none;"><span class="icon">✨</span> Upload to Drive</button>
    <p id="status"></p>
  </div>

  <script>
    const cameraInput = document.getElementById('cameraInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const statusText = document.getElementById('status');
    const preview = document.getElementById('preview');

    // YOUR SCRIPT URL
    const SCRIPT_URL = 'https://script.google.com/macros/library/d/1xXcizgf3G3kTTfIXlZA3PvU--Ljtd3n2qsBrJslNyFVMJg1zAxFqtVhD/3';
    
    let base64Image = "";

    cameraInput.addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
        uploadBtn.style.display = "inline-flex"; 
        statusText.innerText = "Photo looks great! Ready to upload.";
        statusText.style.color = "#555";

        const reader = new FileReader();
        reader.onload = function(e) {
          base64Image = e.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    uploadBtn.addEventListener('click', () => {
      if (!base64Image) return;

      statusText.innerText = "Uploading to Drive... ⏳";
      statusText.style.color = "#c48b36";
      uploadBtn.disabled = true;

      fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ image: base64Image })
      })
      .then(response => response.json())
      .then(data => {
        uploadBtn.disabled = false;
        
        if(data.status === 'success') {
          statusText.innerHTML = `<span style="color: #2e7d32;">✅ Uploaded beautifully! Thank you!</span>`;
          
          setTimeout(() => {
            preview.style.display = "none";
            uploadBtn.style.display = "none";
            statusText.innerText = "";
            cameraInput.value = "";
            base64Image = "";
          }, 4000); 
          
        } else {
          statusText.innerText = "❌ Upload Error: " + data.message;
          statusText.style.color = "#8b0000";
        }
      })
      .catch(err => {
        uploadBtn.disabled = false;
        statusText.innerText = "❌ Network Error. Please check your connection.";
        statusText.style.color = "#8b0000";
        console.error(err);
      });
    });
  </script>
</body>
</html>
