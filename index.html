<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Amlan & Sambita — Wedding Memory Booth</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Shrikhand&display=swap" rel="stylesheet" />
<style>
  :root{
    --coral:#E76F5E;
    --coral-soft:#F79A76;
    --peach:#F6B39D;
    --cream:#FFF4DF;
    --cream-deep:#F4E1BC;
    --yellow:#F3B600;
    --teal:#079B78;
    --teal-dark:#006B55;
    --brown:#3B1A0A;
    --olive:#596241;
    --paper:#FFF8EA;
    --shadow:rgba(59,26,10,.28);
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; min-height:100%; }

  body{
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px 12px;
    font-family:'Baloo 2', system-ui, sans-serif;
    color:var(--brown);
    background:#f7f3ea;
  }

  .app-shell{
    width:min(100%, 430px);
    min-height:720px;
    position:relative;
    overflow:hidden;
    border-radius:18px;
    background:
      linear-gradient(rgba(255,244,223,.22), rgba(255,244,223,.22)),
      conic-gradient(from -8deg at 50% 42%,
        var(--yellow) 0deg 18deg,
        #fff0bd 18deg 36deg,
        var(--coral-soft) 36deg 54deg,
        var(--peach) 54deg 72deg,
        var(--yellow) 72deg 90deg,
        #fff0bd 90deg 108deg,
        var(--coral-soft) 108deg 126deg,
        var(--peach) 126deg 144deg,
        var(--yellow) 144deg 162deg,
        #fff0bd 162deg 180deg,
        var(--coral-soft) 180deg 198deg,
        var(--peach) 198deg 216deg,
        var(--yellow) 216deg 234deg,
        #fff0bd 234deg 252deg,
        var(--coral-soft) 252deg 270deg,
        var(--peach) 270deg 288deg,
        var(--yellow) 288deg 306deg,
        #fff0bd 306deg 324deg,
        var(--coral-soft) 324deg 342deg,
        var(--peach) 342deg 360deg
      );
    box-shadow:0 24px 70px -28px var(--shadow);
    isolation:isolate;
  }

  .app-shell::before{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    background:
      linear-gradient(180deg, rgba(255,244,223,.22), rgba(255,244,223,.06)),
      radial-gradient(rgba(59,26,10,.13) .8px, transparent .8px);
    background-size:auto, 4px 4px;
    opacity:.18;
    z-index:0;
  }

  .app-shell::after{
    content:"";
    position:absolute;
    left:-20px;
    right:-20px;
    top:43%;
    height:90px;
    background:var(--cream);
    border-top:2px solid var(--brown);
    border-bottom:2px solid var(--brown);
    z-index:0;
    opacity:.95;
  }

  .content{
    position:relative;
    z-index:2;
    min-height:720px;
    padding:26px 22px 24px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .top-badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:205px;
    padding:8px 18px 9px;
    background:var(--teal);
    color:var(--cream);
    border:3px solid var(--brown);
    border-radius:999px;
    box-shadow:4px 5px 0 var(--brown);
    font-size:13px;
    font-weight:800;
    letter-spacing:.14em;
    text-transform:uppercase;
    line-height:1;
    margin:0 auto 20px;
    position:relative;
  }

  .top-badge::before,
  .top-badge::after{
    content:"✦";
    position:absolute;
    color:var(--paper);
    text-shadow:2px 2px 0 var(--brown);
    font-size:16px;
    line-height:1;
  }

  .top-badge::before{ left:12px; top:-10px; }
  .top-badge::after{ right:12px; bottom:-10px; }

  .title-card{
    width:100%;
    max-width:330px;
    margin:0 auto 22px;
    padding:16px 18px 18px;
    background:var(--paper);
    border:3px solid var(--brown);
    border-radius:32px;
    box-shadow:6px 7px 0 var(--brown);
    text-align:center;
    position:relative;
  }

  .title-card::before,
  .title-card::after{
    content:"✦";
    position:absolute;
    top:10px;
    color:var(--teal);
    text-shadow:2px 2px 0 rgba(59,26,10,.22);
    font-size:17px;
    line-height:1;
  }

  .title-card::before{ left:17px; transform:rotate(-12deg); }
  .title-card::after{ right:17px; transform:rotate(12deg); }

  .couple-name{
    margin:0;
    font-family:'Shrikhand','Cooper Black','Baloo 2',cursive;
    font-size:40px;
    line-height:.98;
    letter-spacing:.01em;
    color:var(--brown);
    text-shadow:2px 2px 0 rgba(255,244,223,.9);
  }

  .app-subtitle{
    margin:8px 0 0;
    font-size:13px;
    line-height:1;
    letter-spacing:.17em;
    text-transform:uppercase;
    color:var(--teal-dark);
    font-weight:800;
  }

  .star{
    position:absolute;
    width:52px;
    height:52px;
    z-index:1;
    filter:drop-shadow(2px 3px 0 rgba(59,26,10,.18));
  }

  .star svg{ width:100%; height:100%; display:block; }
  .star path{ fill:var(--paper); stroke:var(--brown); stroke-width:4; stroke-linejoin:round; }

  .star.s1{ top:86px; left:28px; }
  .star.s2{ top:86px; right:28px; }
  .star.s3{ bottom:106px; left:34px; }
  .star.s4{ bottom:106px; right:34px; }

  .tv-wrap{
    width:100%;
    max-width:360px;
    margin:0 auto;
    position:relative;
  }

  .retro-tv{
    position:relative;
    width:100%;
    border:7px solid var(--brown);
    border-radius:34px;
    background:var(--teal);
    padding:13px 13px 56px;
    box-shadow:8px 10px 0 var(--brown), 0 18px 45px -28px var(--shadow);
  }

  .retro-tv::before{
    content:"";
    position:absolute;
    inset:5px;
    border:3px solid var(--teal-dark);
    border-radius:27px;
    pointer-events:none;
  }

  .screen{
    position:relative;
    width:100%;
    aspect-ratio:1.38/1;
    border-radius:27px;
    background:var(--paper);
    border:5px solid var(--brown);
    padding:12px;
    overflow:hidden;
  }

  .screen::before{
    content:"";
    position:absolute;
    inset:9px;
    border:2px solid var(--brown);
    border-radius:22px;
    opacity:.65;
    pointer-events:none;
  }

  .screen::after{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    background:radial-gradient(rgba(59,26,10,.16) .85px, transparent .85px);
    background-size:5px 5px;
    opacity:.16;
  }

  #frameSlot,
  .photo-placeholder,
  .photo-frame{
    width:100%;
    height:100%;
  }

  .photo-placeholder{
    position:relative;
    z-index:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:12px;
    text-align:center;
    padding:24px;
    color:var(--olive);
  }

  .placeholder-ring{
    width:72px;
    height:72px;
    border-radius:50%;
    background:var(--teal);
    color:var(--cream);
    display:grid;
    place-items:center;
    border:4px solid var(--brown);
    box-shadow:4px 5px 0 var(--brown);
  }

  .placeholder-ring svg{
    width:34px;
    height:34px;
  }

  .photo-placeholder p{
    margin:0;
    max-width:270px;
    font-size:21px;
    line-height:1.12;
    color:var(--olive);
    font-weight:700;
    text-transform:lowercase;
  }

  .photo-frame{
    position:relative;
    z-index:1;
    border-radius:18px;
    overflow:hidden;
    background:var(--paper);
  }

  .photo-frame img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    border-radius:16px;
  }

  .tv-controls{
    position:absolute;
    left:16px;
    right:16px;
    bottom:12px;
    height:34px;
    background:var(--cream);
    border:4px solid var(--brown);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    border-radius:8px;
    overflow:hidden;
  }

  .speaker-grid{
    width:145px;
    height:20px;
    background:
      linear-gradient(90deg, var(--brown) 2px, transparent 2px),
      linear-gradient(var(--brown) 2px, transparent 2px);
    background-size:9px 6px;
    opacity:.86;
  }

  .knob{
    width:32px;
    height:32px;
    flex:0 0 auto;
    border:4px solid var(--brown);
    background:var(--cream);
    border-radius:50%;
    position:relative;
  }

  .knob::after{
    content:"";
    position:absolute;
    inset:7px;
    border-radius:50%;
    background:var(--teal);
    border:3px solid var(--brown);
  }

  .capture-area{
    width:100%;
    margin-top:24px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
  }

  .capture-btn{
    display:inline-flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    align-self:center;
  }

  .capture-btn input{ display:none; }

  .capture-btn-inner,
  .save-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    border-radius:999px;
    background:var(--teal);
    color:var(--cream);
    border:3px solid var(--brown);
    box-shadow:4px 5px 0 var(--brown);
    font-family:'Baloo 2', system-ui, sans-serif;
    font-weight:800;
    line-height:1;
    cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease;
  }

  .capture-btn-inner{
    min-width:205px;
    padding:11px 24px 12px;
    font-size:17px;
  }

  .capture-btn-inner svg{
    width:18px;
    height:18px;
    margin-right:8px;
  }

  .save-btn{
    display:none;
    min-width:176px;
    padding:9px 18px 10px;
    font-size:13px;
    background:var(--cream);
    color:var(--brown);
  }

  .capture-btn:active .capture-btn-inner,
  .save-btn:active{
    transform:translate(3px, 3px);
    box-shadow:1px 2px 0 var(--brown);
  }

  .status-footer{
    width:100%;
    margin-top:auto;
    padding-top:18px;
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
  }

  .status{
    min-height:20px;
    margin:0;
    font-size:14px;
    line-height:1.2;
    font-weight:700;
    color:var(--brown);
    max-width:330px;
  }

  .status.loading{ color:var(--teal-dark); }
  .status.success{ color:var(--teal-dark); }
  .status.error{ color:#A32622; }

  .signature{
    margin:0;
    font-family:'Baloo 2', system-ui, sans-serif;
    font-size:14px;
    line-height:1.08;
    font-weight:800;
    color:var(--cream);
    background:var(--teal);
    padding:8px 22px 9px;
    border-radius:18px;
    border:3px solid var(--brown);
    box-shadow:4px 5px 0 var(--brown);
    min-width:205px;
    position:relative;
  }

  .signature::before,
  .signature::after{
    content:"✦";
    position:absolute;
    color:var(--paper);
    text-shadow:2px 2px 0 var(--brown);
    font-size:12px;
  }

  .signature::before{ left:10px; top:-7px; }
  .signature::after{ right:10px; bottom:-7px; }

  @media (max-width:420px){
    body{ padding:0; background:#f7f3ea; }
    .app-shell{ width:100%; min-height:100dvh; border-radius:0; }
    .content{ min-height:100dvh; padding:24px 18px 20px; }
    .top-badge{ margin-bottom:17px; transform:scale(.94); }
    .title-card{ max-width:310px; padding:14px 16px 16px; margin-bottom:20px; }
    .couple-name{ font-size:35px; }
    .app-subtitle{ font-size:12px; }
    .tv-wrap{ max-width:340px; }
    .retro-tv{ padding:12px 12px 52px; border-width:6px; }
    .screen{ border-width:4px; }
    .photo-placeholder p{ font-size:19px; }
    .placeholder-ring{ width:66px; height:66px; }
    .star{ width:42px; height:42px; }
    .star.s1{ top:92px; left:14px; }
    .star.s2{ top:92px; right:14px; }
    .star.s3{ bottom:108px; left:18px; }
    .star.s4{ bottom:108px; right:18px; }
    .capture-area{ margin-top:22px; }
    .signature{ font-size:13px; min-width:190px; }
  }

  @media (max-height:720px){
    .app-shell{ min-height:680px; }
    .content{ min-height:680px; padding-top:18px; }
    .top-badge{ margin-bottom:14px; }
    .title-card{ margin-bottom:16px; }
    .couple-name{ font-size:33px; }
    .tv-wrap{ max-width:330px; }
    .capture-area{ margin-top:18px; }
    .status-footer{ padding-top:12px; }
  }
</style>
</head>
<body>
  <main class="app-shell" role="main">
    <div class="content">
      <div class="top-badge">Wedding Memory Booth</div>

      <section class="title-card" aria-label="Couple name">
        <h1 class="couple-name">Amlan &amp;<br>Sambita</h1>
        <p class="app-subtitle">Moments From Our Forever</p>
      </section>

      <div class="star s1" aria-hidden="true">
        <svg viewBox="0 0 100 100"><path d="M50 4 C57 31 69 43 96 50 C69 57 57 69 50 96 C43 69 31 57 4 50 C31 43 43 31 50 4Z" /></svg>
      </div>
      <div class="star s2" aria-hidden="true">
        <svg viewBox="0 0 100 100"><path d="M50 4 C57 31 69 43 96 50 C69 57 57 69 50 96 C43 69 31 57 4 50 C31 43 43 31 50 4Z" /></svg>
      </div>
      <div class="star s3" aria-hidden="true">
        <svg viewBox="0 0 100 100"><path d="M50 4 C57 31 69 43 96 50 C69 57 57 69 50 96 C43 69 31 57 4 50 C31 43 43 31 50 4Z" /></svg>
      </div>
      <div class="star s4" aria-hidden="true">
        <svg viewBox="0 0 100 100"><path d="M50 4 C57 31 69 43 96 50 C69 57 57 69 50 96 C43 69 31 57 4 50 C31 43 43 31 50 4Z" /></svg>
      </div>

      <section class="tv-wrap" aria-label="Photo upload area">
        <div class="retro-tv">
          <div class="screen">
            <div id="frameSlot">
              <div class="photo-placeholder" id="placeholder">
                <div class="placeholder-ring" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 8h3l2-2h6l2 2h3a1 1 0 011 1v9a1 1 0 01-1 1H4a1 1 0 01-1-1V9a1 1 0 011-1z" />
                    <circle cx="12" cy="13" r="3.5" />
                  </svg>
                </div>
                <p>Capture a moment<br>we'll treasure forever</p>
              </div>
            </div>
          </div>

          <div class="tv-controls" aria-hidden="true">
            <div class="knob"></div>
            <div class="speaker-grid"></div>
            <div class="knob"></div>
          </div>
        </div>
      </section>

      <section class="capture-area">
        <label class="capture-btn">
          <input type="file" id="cameraInput" accept="image/*" capture="environment" />
          <span class="capture-btn-inner" id="captureLabel">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 8h3l2-2h6l2 2h3a1 1 0 011 1v9a1 1 0 01-1 1H4a1 1 0 01-1-1V9a1 1 0 011-1z" />
              <circle cx="12" cy="13" r="3.5" />
            </svg>
            <span class="label-text">Add to Memories</span>
          </span>
        </label>

        <button class="save-btn" id="savePhoneBtn">Download Photo</button>
      </section>

      <footer class="status-footer">
        <p class="status" id="status">&nbsp;</p>
        <div class="signature">Forever grateful,<br>Amlan &amp; Sambita</div>
      </footer>
    </div>
  </main>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyHe2KsUovNfHoOb0UT5nG9f3DhowNKFHW8FJQbyBr8bualnScJtnNksE3GjDE9m3hQ/exec';

  const cameraInput  = document.getElementById('cameraInput');
  const savePhoneBtn = document.getElementById('savePhoneBtn');
  const statusText   = document.getElementById('status');
  const frameSlot    = document.getElementById('frameSlot');
  const captureLabel = document.getElementById('captureLabel');
  const labelText    = captureLabel.querySelector('.label-text');

  let currentBase64Image = "";

  function setStatus(text, tone){
    statusText.textContent = text;
    statusText.className = 'status ' + (tone || '');
  }

  function showImage(src){
    frameSlot.innerHTML = '<div class="photo-frame"><img id="preview" alt="Your captured moment" /></div>';
    document.getElementById('preview').src = src;
    savePhoneBtn.style.display = 'inline-flex';
    labelText.textContent = 'Retake Memory';
  }

  cameraInput.addEventListener('change', (event) => {
    const file = event.target.files[0];
    if (!file) return;

    showImage(URL.createObjectURL(file));
    setStatus("Adding your memory to Amlan & Sambita's wedding album...", "loading");

    const reader = new FileReader();
    reader.onload = function(e){
      currentBase64Image = e.target.result;
      fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ image: currentBase64Image }),
        mode: 'no-cors'
      })
      .then(() => setStatus("Your memory has been added to Amlan & Sambita's forever album ✨", "success"))
      .catch(() => setStatus("Network error. Please try again.", "error"));
    };
    reader.readAsDataURL(file);
  });

  savePhoneBtn.addEventListener('click', () => {
    if (!currentBase64Image) return;
    const a = document.createElement('a');
    a.href = currentBase64Image;
    a.download = `Amlan_Sambita_Wedding_${Date.now()}.jpg`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    const original = savePhoneBtn.textContent;
    savePhoneBtn.textContent = 'Saved ✓';
    setTimeout(() => savePhoneBtn.textContent = original, 2000);
  });
</script>
</body>
</html>
