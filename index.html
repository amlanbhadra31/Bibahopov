<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amlan & Sambita's Wedding</title>

  <!-- Importing Eagle Lake from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Eagle+Lake&display=swap" rel="stylesheet">

  <style>
    body { 
      margin: 0;
      background-color: #4a2912; 
      display: flex; 
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Eagle Lake', serif;
    }

    #app-container {
      position: relative;
      width: 100%;
      height: 100vh;
      max-width: 450px; 
      background-image: url('wedding-bg.jpg');
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      
      /* KEY FIX 1: This stops the text from jumping up over the Ganesha */
      justify-content: flex-start; 
      align-items: center;
      padding-top: 25vh; /* Pushes everything perfectly under the Ganesha */
      box-sizing: border-box;
      overflow-y: auto;
    }

    .content-area {
      width: 90%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-family: 'Eagle Lake', serif;
      font-size: 34px; /* Slightly smaller to fit perfectly */
      color: #FFFDD0; 
      margin: 0 0 5px 0;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      line-height: 1.1;
      font-weight: normal;
    }
    
    p.subtitle {
      font-family: 'Eagle Lake', serif;
      font-size: 16px;
      color: #E5B80B; 
      margin-bottom: 20px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }

    .custom-file-upload {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 30px;
      cursor: pointer;
      background: rgba(42, 21, 8, 0.6); 
      border: 2px solid #E5B80B; 
      color: #E5B80B;
      font-family: 'Eagle Lake', serif;
      font-size: 15px;
      letter-spacing: 1px;
      border-radius: 8px; 
      margin-bottom: 15px;
      transition: all 0.3s;
      
      /* KEY FIX 2: Makes the button small and centered between the leaves */
      width: auto; 
      min-width: 160px;
      box-sizing: border-box;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }
    
    .custom-file-upload:active {
      transform: scale(0.97);
      background: rgba(229, 184, 11, 0.2); 
    }

    input[type="file"] { 
      display: none; 
    }

    #savePhoneBtn { 
      padding: 10px 25px; 
      font-size: 13px; 
      font-family: 'Eagle Lake', serif;
      cursor: pointer; 
      background: rgba(255, 253, 208, 0.1); 
      color: #FFFDD0; 
      border: 1px solid #FFFDD0; 
      border-radius: 8px; 
      
      /* KEY FIX 3: Makes the save button small and centered */
      width: auto; 
      min-width: 150px;
      margin: 15px auto 0 auto;
      transition: transform 0.2s;
      display: none; 
      letter-spacing: 1px;
    }

    #preview-container {
      position: relative;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #preview { 
      max-width: 90%; 
      
      /* KEY FIX 4: Limits photo height so it doesn't push into the bottom border */
      max-height: 26vh; 
      object-fit: contain;
      border-radius: 4px; 
      display: none; 
      border: 3px solid #E5B80B; 
      box-shadow: 0 8px 20px rgba(0,0,0,0.6);
    }

    #status { 
      margin-top: 15px; 
      font-family: 'Eagle Lake', serif;
      font-size: 14px;
      color: #FFFDD0;
      min-height: 24px;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
      padding: 0 10px;
    }
  </style>
</head>
<body>

  <div id="app-container">
    <div class="content-area">
      <h1>Amlan & Sambita</h1>
      <p class="subtitle">Capture a memory for us</p>
      
      <label class="custom-file-upload">
        <input type="file" id="cameraInput" accept="image/*" capture="environment">
        Take Photo
      </label>
      
      <div id="preview-container">
        <img id="preview" alt="Your beautiful photo">
        <button id="savePhoneBtn">Save to Gallery</button>
      </div>
      
      <p id="status"></p>
    </div>
  </div>

  <script>
    const cameraInput = document.getElementById('cameraInput');
    const savePhoneBtn = document.getElementById('savePhoneBtn');
    const statusText = document.getElementById('status');
    const preview = document.getElementById('preview');

    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyHe2KsUovNfHoOb0UT5nG9f3DhowNKFHW8FJQbyBr8bualnScJtnNksE3GjDE9m3hQ/exec';
    
    let currentBase64Image = "";

    cameraInput.addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (!file) return;

      preview.src = URL.createObjectURL(file);
      preview.style.display = "block";
      savePhoneBtn.style.display = "inline-flex"; 
      
      statusText.innerHTML = "Preserving this beautiful moment...";
      statusText.style.color = "#E5B80B"; 

      const reader = new FileReader();
      reader.onload = function(e) {
        currentBase64Image = e.target.result;

        fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ image: currentBase64Image }),
          mode: 'no-cors' 
        })
        .then(() => {
          statusText.innerHTML = "Thank you for helping preserve their special day.";
          statusText.style.color = "#FFFDD0"; 
        })
        .catch(err => {
          statusText.innerHTML = "Network Error.";
          statusText.style.color = "#ff6b6b"; 
          console.error(err);
        });
      };
      
      reader.readAsDataURL(file);
    });

    savePhoneBtn.addEventListener('click', () => {
      if (!currentBase64Image) return;

      const downloadLink = document.createElement('a');
      downloadLink.href = currentBase64Image;
      downloadLink.download = `Amlan_Sambita_Wedding_${new Date().getTime()}.jpg`;
      document.body.appendChild(downloadLink);
      downloadLink.click();
      document.body.removeChild(downloadLink);
      
      const originalText = savePhoneBtn.innerHTML;
      savePhoneBtn.innerHTML = "Saved!";
      setTimeout(() => {
        savePhoneBtn.innerHTML = originalText;
      }, 2000);
    });
  </script>
</body>
</html>
