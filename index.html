<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amlan & Sambita's Wedding</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Playfair+Display:ital,wght@0,600;1,500&family=Lora:ital@0;1&display=swap" rel="stylesheet">

  <style>
    /* The outer body sets a matching dark brown fallback */
    body { 
      margin: 0;
      background-color: #4a2912; 
      display: flex; 
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* The main mobile container holding your artwork */
    #app-container {
      position: relative;
      width: 100%;
      height: 100vh;
      max-width: 450px; /* Keeps it looking like a phone screen on desktop */
      background-image: url('wedding-bg.jpg');
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow-y: auto;
    }

    /* Constrains the content to fit inside the brown arch */
    .content-area {
      width: 80%;
      text-align: center;
      /* Pushes the content slightly down to avoid the top Ganesha */
      margin-top: 15vh; 
      margin-bottom: 10vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Typography */
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 38px;
      color: #FFFDD0; /* Rich Cream */
      margin: 0 0 5px 0;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      line-height: 1.1;
    }
    
    p.subtitle {
      font-family: 'Lora', serif;
      font-size: 16px;
      color: #E5B80B; /* Muted Gold */
      margin-bottom: 30px;
      font-style: italic;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }

    /* Royal Button Styling */
    .custom-file-upload {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 28px;
      cursor: pointer;
      background: rgba(42, 21, 8, 0.6); /* Translucent dark brown */
      border: 2px solid #E5B80B; /* Gold border */
      color: #E5B80B;
      font-family: 'Cinzel', serif; /* Classic Roman font */
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1px;
      border-radius: 8px; /* Elegant slightly rounded corners, not pill-shaped */
      margin-bottom: 20px;
      transition: all 0.3s;
      width: 100%;
      box-sizing: border-box;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }
    
    .custom-file-upload:active {
      transform: scale(0.97);
      background: rgba(229, 184, 11, 0.2); /* Flash of gold */
    }

    input[type="file"] { 
      display: none; 
    }

    #savePhoneBtn { 
      padding: 12px 20px; 
      font-size: 14px; 
      font-weight: 700;
      font-family: 'Cinzel', serif;
      cursor: pointer; 
      background: rgba(255, 253, 208, 0.1); /* Slight cream tint */
      color: #FFFDD0; 
      border: 1px solid #FFFDD0; 
      border-radius: 8px; 
      width: 90%;
      margin: 15px auto 0 auto;
      transition: transform 0.2s;
      display: none; 
      letter-spacing: 1px;
    }

    /* Image Preview */
    #preview-container {
      position: relative;
      margin-bottom: 15px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #preview { 
      max-width: 100%; 
      max-height: 35vh; /* Prevents long photos from overflowing the arch */
      object-fit: contain;
      border-radius: 4px; 
      display: none; 
      border: 3px solid #E5B80B; /* Gold frame for the photo */
      box-shadow: 0 8px 20px rgba(0,0,0,0.6);
    }

    #status { 
      margin-top: 15px; 
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 15px;
      color: #FFFDD0;
      min-height: 24px;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
    }

    .icon {
      font-size: 20px;
      margin-right: 10px;
    }
  </style>
</head>
<body>

  <div id="app-container">
    <div class="content-area">
      <h1>Amlan & Sambita</h1>
      <p class="subtitle">Capture a memory for us</p>
      
      <label class="custom-file-upload">
        <input type="file" id="cameraInput" accept="image/*" capture="environment">
        <span class="icon">📸</span> Take Photo
      </label>
      
      <div id="preview-container">
        <img id="preview" alt="Your beautiful photo">
        <button id="savePhoneBtn"><span class="icon">💾</span> Save to Gallery</button>
      </div>
      
      <p id="status"></p>
    </div>
  </div>

  <script>
    const cameraInput = document.getElementById('cameraInput');
    const savePhoneBtn = document.getElementById('savePhoneBtn');
    const statusText = document.getElementById('status');
    const preview = document.getElementById('preview');

    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyHe2KsUovNfHoOb0UT5nG9f3DhowNKFHW8FJQbyBr8bualnScJtnNksE3GjDE9m3hQ/exec';
    
    let currentBase64Image = "";

    cameraInput.addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (!file) return;

      // Show the preview and the Save button immediately
      preview.src = URL.createObjectURL(file);
      preview.style.display = "block";
      savePhoneBtn.style.display = "inline-flex"; 
      
      // Royal loading text
      statusText.innerHTML = "Preserving this beautiful moment... ⏳";
      statusText.style.color = "#E5B80B"; // Gold

      const reader = new FileReader();
      reader.onload = function(e) {
        currentBase64Image = e.target.result;

        // Upload to Google Drive quietly in the background
        fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ image: currentBase64Image }),
          mode: 'no-cors' 
        })
        .then(() => {
          // Soft cream success message
          statusText.innerHTML = `✅ Thank you for helping preserve their special day`;
          statusText.style.color = "#FFFDD0"; 
        })
        .catch(err => {
          statusText.innerHTML = `❌ Network Error.`;
          statusText.style.color = "#ff6b6b"; // Softer red that fits the dark background
          console.error(err);
        });
      };
      
      reader.readAsDataURL(file);
    });

    // Logic for the "Save to My Phone" button
    savePhoneBtn.addEventListener('click', () => {
      if (!currentBase64Image) return;

      const downloadLink = document.createElement('a');
      downloadLink.href = currentBase64Image;
      downloadLink.download = `Amlan_Sambita_Wedding_${new Date().getTime()}.jpg`;
      document.body.appendChild(downloadLink);
      downloadLink.click();
      document.body.removeChild(downloadLink);
      
      const originalText = savePhoneBtn.innerHTML;
      savePhoneBtn.innerHTML = `<span class="icon">✅</span> Saved!`;
      setTimeout(() => {
        savePhoneBtn.innerHTML = originalText;
      }, 2000);
    });
  </script>
</body>
</html>
